<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipe Tally — Float</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #060d1a; color: #e2eaf5;
            font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; font-size: 13px;
        }
        .float-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 14px; background: #0d1b2e;
            border-bottom: 1px solid #1e3352; flex-shrink: 0;
        }
        .float-topbar-title {
            font-size: 12px; font-weight: 700; letter-spacing: .08em; color: #00d4ff; text-transform: uppercase;
        }
        .float-topbar-meta {
            display: flex; align-items: center; gap: 12px; font-size: 10px; color: #6b8aaa;
        }
        .float-topbar-meta b { color: #e2eaf5; font-weight: 600; }
        .float-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 700;
            cursor: pointer; border: 1px solid rgba(0,212,255,.28);
            background: rgba(0,212,255,.12); color: #00d4ff;
            letter-spacing: .04em; transition: all .12s;
        }
        .float-btn:hover { background: rgba(0,212,255,.22); box-shadow: 0 0 10px rgba(0,212,255,.18); }
        .float-btn-dock { background: rgba(245,158,11,.12); color: #f59e0b; border-color: rgba(245,158,11,.3); }
        .float-btn-dock:hover { background: rgba(245,158,11,.22); box-shadow: 0 0 10px rgba(245,158,11,.18); }
        .float-badge {
            display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px;
            border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: .05em;
            text-transform: uppercase;
            background: rgba(0,212,255,.10); color: #00d4ff; border: 1px solid rgba(0,212,255,.25);
        }
        .float-badge-flag { background: rgba(244,63,94,.15); color: #f43f5e; border: 1px solid rgba(244,63,94,.3); }
        .float-grid-wrap { flex: 1; min-height: 0; }
        #floatGrid { width: 100%; height: 100%; }

        .ag-theme-quartz.float-grid-theme {
            --ag-background-color: #0b1628;
            --ag-foreground-color: #e2eaf5;
            --ag-border-color: #1e3352;
            --ag-header-background-color: rgba(0,0,0,.34);
            --ag-header-foreground-color: #6b8aaa;
            --ag-odd-row-background-color: rgba(255,255,255,.015);
            --ag-row-hover-color: rgba(0,212,255,.05);
            --ag-selected-row-background-color: rgba(0,212,255,.12);
            --ag-font-family: 'Inter', sans-serif;
            --ag-font-size: 11px;
            --ag-cell-horizontal-padding: 10px;
            --ag-header-height: 30px;
            --ag-row-height: 32px;
            --ag-wrapper-border-radius: 0;
            --ag-header-column-resize-handle-color: rgba(0,212,255,.35);
        }
        .ag-theme-quartz.float-grid-theme .ag-header-cell-text {
            font-size: 9.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
        }
        .ag-theme-quartz.float-grid-theme .ag-cell {
            font-family: 'JetBrains Mono', monospace;
            border-color: rgba(30,51,82,.55);
        }
        .ag-theme-quartz.float-grid-theme .ag-row.tally-row-ok .ag-cell { color: #34d399; }
        .ag-theme-quartz.float-grid-theme .ag-row.tally-row-warn .ag-cell { color: #f59e0b; }
        .ag-theme-quartz.float-grid-theme .ag-row.tally-row-flag .ag-cell { color: #f43f5e; }
        .ag-theme-quartz.float-grid-theme .ag-cell.status-cell { font-weight: 700; }

        .float-statusbar {
            display: flex; align-items: center; gap: 14px;
            padding: 4px 14px; background: #0d1b2e;
            border-top: 1px solid #1e3352; flex-shrink: 0;
            font-size: 10px; color: #6b8aaa;
        }
        .float-statusbar b { color: #e2eaf5; font-weight: 600; }
        .sync-indicator {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 600;
        }
        .sync-indicator.live { background: rgba(52,211,153,.12); color: #34d399; }
        .sync-indicator.lost { background: rgba(244,63,94,.12); color: #f43f5e; }
    </style>
</head>
<body>
    <div class="float-topbar">
        <div style="display:flex;align-items:center;gap:10px">
            <span class="float-topbar-title">Pipe Tally</span>
            <span class="float-badge">POF 2021</span>
        </div>
        <div class="float-topbar-meta">
            <span>Joints: <b id="floatJointCount">—</b></span>
            <span>Total: <b id="floatTotalLength">—</b></span>
            <span>Flagged: <b id="floatFlaggedCount" style="color:#f43f5e">—</b></span>
            <span class="sync-indicator live" id="floatSyncBadge">● Synced</span>
            <button class="float-btn float-btn-dock" id="floatDockBtn">⤓ Dock</button>
        </div>
    </div>
    <div class="float-grid-wrap">
        <div id="floatGrid" class="ag-theme-quartz float-grid-theme"></div>
    </div>
    <div class="float-statusbar">
        <span id="floatStatusMsg">Ready — awaiting data from main dashboard</span>
    </div>

    <script type="module" src="/pages/tally-float.js"></script>
</body>
</html>
